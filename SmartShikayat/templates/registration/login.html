{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-75 py-5">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            
            <div class="glass-card p-4 p-md-5 animate-fade-up">
                <div class="text-center mb-4">
                    <img src="/media/complaints/logo1.png" alt="Logo" class="mb-3" style="height: 60px; filter: var(--logo-filter);">
                    <h3 class="fw-bold font-monospace">ACCESS_TERMINAL</h3>
                    <p class="text-secondary small">Please authenticate to continue.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger-glow text-center small py-2 mb-3">
                            {{ form.non_field_errors.0 }}
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label-tech">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle text-secondary">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter ID" required id="id_username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label-tech mb-0">Password</label>
                            <a href="#" class="text-decoration-none small text-accent">Forgot?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle text-secondary">
                                <i class="bi bi-key"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required id="id_password">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary-glow btn-lg">INITIALIZE SESSION</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top border-secondary-subtle">
                    <p class="small text-muted mb-0">New User?</p>
                    <a href="{% url 'citizen_signup' %}" class="text-decoration-none fw-bold text-accent">Create Citizen Account</a>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Specific overrides for Login Input Groups */
    .input-group-text {
        background-color: var(--bg-surface) !important;
        border-color: var(--border-color) !important;
    }
    
    .input-group .form-control {
        border-left: none; 
    }
    
    .input-group:focus-within .input-group-text {
        border-color: var(--primary-color) !important;
        color: var(--primary-color) !important;
    }
    
    .min-vh-75 { min-height: 75vh; }
</style>
{% endblock %}
